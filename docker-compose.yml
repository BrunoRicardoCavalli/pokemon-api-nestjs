services:
  postgres:
    image: postgres:16
    container_name: pokemon_teams_db
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pokemon_teams
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: